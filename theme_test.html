<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black & White Theme Test</title>
    <link rel="stylesheet" href="static/css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="theme-light">
    <div class="container mt-5">
        <h1>Weather App - Black & White Theme Test</h1>
        
        <div class="row mb-4">
            <div class="col">
                <button class="btn btn-outline-primary" onclick="toggleTheme()">
                    <i data-feather="sun" id="theme-icon"></i>
                    Toggle Theme
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="glass-effect p-4">
                    <h3>Weather Card</h3>
                    <div class="weather-main-card text-center">
                        <h2 class="location-name">London, GB</h2>
                        <div class="current-temp">22°C</div>
                        <div class="weather-condition">Partly Cloudy</div>
                        <div class="weather-icon-large">
                            <i data-feather="cloud" style="width: 64px; height: 64px;"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="glass-effect p-4">
                    <h3>Weather Details</h3>
                    <div class="row">
                        <div class="col-6">
                            <div class="weather-detail-card text-center p-3">
                                <i data-feather="thermometer" class="weather-icon"></i>
                                <div class="detail-label">Temperature</div>
                                <div class="detail-value">22°C</div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="weather-detail-card text-center p-3">
                                <i data-feather="droplet" class="weather-icon"></i>
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">65%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col">
                <div class="glass-effect p-4">
                    <h3>Form Elements</h3>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">City Name</label>
                                <input type="text" class="form-control" placeholder="Enter city name">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Actions</label>
                                <div>
                                    <button class="btn btn-primary me-2">Primary</button>
                                    <button class="btn btn-secondary me-2">Secondary</button>
                                    <button class="btn btn-outline-primary">Outline</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTheme = 'light';
        
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.className = `theme-${currentTheme}`;
            
            const themeIcon = document.getElementById('theme-icon');
            if (currentTheme === 'dark') {
                themeIcon.setAttribute('data-feather', 'moon');
            } else {
                themeIcon.setAttribute('data-feather', 'sun');
            }
            
            feather.replace();
        }
        
        // Initialize feather icons
        feather.replace();
    </script>
</body>
</html>
