<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit Preferences - Weather App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .preferences-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .preferences-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .preferences-title {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .preferences-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .preferences-form {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        
        .preference-section {
            margin-bottom: 30px;
        }
        
        .preference-section h3 {
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .preference-group {
            margin-bottom: 20px;
        }
        
        .preference-label {
            display: block;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .preference-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--glass-bg);
            color: var(--text-color);
            font-size: 1rem;
        }
        
        .preference-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.2);
        }
        
        .color-preferences {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .color-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .color-option:hover {
            transform: scale(1.1);
        }
        
        .color-option.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
        }
        
        .color-option.selected::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .preference-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .preference-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary-color);
        }
        
        .preference-checkbox label {
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .preferences-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .preferences-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 1rem;
        }
        
        .preferences-btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .preferences-btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        
        .preferences-btn-secondary {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
        }
        
        .preferences-btn-secondary:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .preferences-container {
                padding: 15px;
            }
            
            .preferences-title {
                font-size: 2rem;
            }
            
            .preferences-form {
                padding: 20px;
            }
            
            .preferences-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .preferences-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-brand">Weather App</div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('forecast') }}">Forecast</a></li>
                <li><a href="{{ url_for('search') }}">Search</a></li>
                <li><a href="{{ url_for('map') }}">Map</a></li>
                <li><a href="{{ url_for('outfit_2d') }}">Outfits</a></li>
            </ul>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </nav>

        <div class="preferences-container">
            <div class="preferences-header">
                <h1 class="preferences-title">Outfit Preferences</h1>
                <p class="preferences-subtitle">Customize your weather-appropriate outfit suggestions</p>
            </div>
            
            <form class="preferences-form" id="preferences-form">
                <div class="preference-section">
                    <h3>Style Preferences</h3>
                    
                    <div class="preference-group">
                        <label class="preference-label" for="style-preference">Preferred Style</label>
                        <select class="preference-select" id="style-preference">
                            <option value="casual">Casual</option>
                            <option value="formal">Formal</option>
                            <option value="sporty">Sporty</option>
                            <option value="trendy">Trendy</option>
                        </select>
                    </div>
                    
                    <div class="preference-group">
                        <label class="preference-label" for="comfort-preference">Comfort Level</label>
                        <select class="preference-select" id="comfort-preference">
                            <option value="low">Low (Fashion over comfort)</option>
                            <option value="medium">Medium (Balanced)</option>
                            <option value="high">High (Comfort first)</option>
                        </select>
                    </div>
                    
                    <div class="preference-group">
                        <label class="preference-label" for="layers-preference">Layering Preference</label>
                        <select class="preference-select" id="layers-preference">
                            <option value="light">Light (Minimal layers)</option>
                            <option value="medium">Medium (Moderate layers)</option>
                            <option value="heavy">Heavy (Multiple layers)</option>
                        </select>
                    </div>
                </div>
                
                <div class="preference-section">
                    <h3>Color Preferences</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 15px;">Select your preferred colors (click to toggle)</p>
                    
                    <div class="color-preferences">
                        <div class="color-option selected" data-color="blue" style="background-color: #1E90FF;"></div>
                        <div class="color-option selected" data-color="black" style="background-color: #000000;"></div>
                        <div class="color-option selected" data-color="white" style="background-color: #FFFFFF;"></div>
                        <div class="color-option selected" data-color="gray" style="background-color: #808080;"></div>
                        <div class="color-option" data-color="red" style="background-color: #FF6B6B;"></div>
                        <div class="color-option" data-color="green" style="background-color: #32CD32;"></div>
                        <div class="color-option" data-color="yellow" style="background-color: #FFD700;"></div>
                        <div class="color-option" data-color="purple" style="background-color: #9370DB;"></div>
                        <div class="color-option" data-color="pink" style="background-color: #FF69B4;"></div>
                        <div class="color-option" data-color="orange" style="background-color: #FFA500;"></div>
                    </div>
                </div>
                
                <div class="preference-section">
                    <h3>Additional Preferences</h3>
                    
                    <div class="preference-group">
                        <label class="preference-label" for="footwear-preference">Footwear Preference</label>
                        <select class="preference-select" id="footwear-preference">
                            <option value="comfortable">Comfortable</option>
                            <option value="stylish">Stylish</option>
                            <option value="sporty">Sporty</option>
                            <option value="formal">Formal</option>
                        </select>
                    </div>
                    
                    <div class="preference-checkbox">
                        <input type="checkbox" id="accessories-preference" checked>
                        <label for="accessories-preference">Include accessories in suggestions</label>
                    </div>
                </div>
                
                <div class="preferences-actions">
                    <button type="button" class="preferences-btn preferences-btn-primary" onclick="savePreferences()">
                        💾 Save Preferences
                    </button>
                    <button type="button" class="preferences-btn preferences-btn-secondary" onclick="resetPreferences()">
                        🔄 Reset to Default
                    </button>
                    <button type="button" class="preferences-btn preferences-btn-secondary" onclick="goBack()">
                        ← Back to Outfits
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/outfit-suggestions.js') }}"></script>
    <script>
        // Initialize color selection
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', function() {
                this.classList.toggle('selected');
            });
        });
        
        // Load saved preferences
        function loadPreferences() {
            const preferences = JSON.parse(localStorage.getItem('outfitPreferences') || '{}');
            
            if (preferences.style) {
                document.getElementById('style-preference').value = preferences.style;
            }
            if (preferences.comfort) {
                document.getElementById('comfort-preference').value = preferences.comfort;
            }
            if (preferences.layers) {
                document.getElementById('layers-preference').value = preferences.layers;
            }
            if (preferences.footwear) {
                document.getElementById('footwear-preference').value = preferences.footwear;
            }
            if (preferences.accessories !== undefined) {
                document.getElementById('accessories-preference').checked = preferences.accessories;
            }
            
            // Load color preferences
            if (preferences.colors) {
                document.querySelectorAll('.color-option').forEach(option => {
                    const color = option.dataset.color;
                    if (preferences.colors.includes(color)) {
                        option.classList.add('selected');
                    } else {
                        option.classList.remove('selected');
                    }
                });
            }
        }
        
        // Save preferences
        function savePreferences() {
            const preferences = {
                style: document.getElementById('style-preference').value,
                comfort: document.getElementById('comfort-preference').value,
                layers: document.getElementById('layers-preference').value,
                footwear: document.getElementById('footwear-preference').value,
                accessories: document.getElementById('accessories-preference').checked,
                colors: Array.from(document.querySelectorAll('.color-option.selected')).map(option => option.dataset.color)
            };
            
            localStorage.setItem('outfitPreferences', JSON.stringify(preferences));
            
            // Update outfit suggestions system if available
            if (typeof updateOutfitPreferences === 'function') {
                updateOutfitPreferences(preferences);
            }
            
            alert('Preferences saved successfully!');
        }
        
        // Reset preferences
        function resetPreferences() {
            if (confirm('Are you sure you want to reset all preferences to default?')) {
                localStorage.removeItem('outfitPreferences');
                loadPreferences();
                alert('Preferences reset to default!');
            }
        }
        
        // Go back to outfits page
        function goBack() {
            window.location.href = '/outfit-2d';
        }
        
        // Load preferences on page load
        document.addEventListener('DOMContentLoaded', loadPreferences);
    </script>
</body>
</html>
