{% extends "base.html" %}

{% block title %}Access Forbidden - Weather Wiz{% endblock %}

{% block content %}
<div class="error-container" style="text-align: center; padding: 100px 20px;">
    <div class="error-card" style="max-width: 500px; margin: 0 auto; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 50px; backdrop-filter: blur(15px); box-shadow: 0 8px 32px var(--shadow);">
        <div style="font-size: 6rem; color: #ff9800; margin-bottom: 20px;">403</div>
        <h1 style="color: var(--text-primary); margin-bottom: 20px;">Access Forbidden</h1>
        <p style="color: var(--text-secondary); margin-bottom: 30px; line-height: 1.6;">
            You don't have permission to access this resource. Please log in or contact support if you believe this is an error.
        </p>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('auth.login') }}" style="background: linear-gradient(135deg, var(--primary-color), var(--primary-hover)); color: white; padding: 12px 24px; border-radius: 25px; text-decoration: none; font-weight: 600; transition: all 0.3s ease;">
                <i data-feather="log-in"></i> Login
            </a>
            <a href="{{ url_for('index') }}" style="background: var(--glass-bg); color: var(--text-primary); border: 2px solid var(--glass-border); padding: 10px 22px; border-radius: 25px; text-decoration: none; font-weight: 600; transition: all 0.3s ease;">
                <i data-feather="home"></i> Go Home
            </a>
        </div>
    </div>
</div>

<script>
if (typeof feather !== 'undefined') {
    feather.replace();
}
</script>
{% endblock %}
